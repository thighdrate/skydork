<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skydork</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg: #07070f;
    --text-main: #ede8ff;
    --text-sub: rgba(210, 200, 255, 0.45);
    --accent: rgba(180, 150, 255, 0.6);
    --line: rgba(190, 165, 255, 0.25);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    overflow: hidden;
  }

  /* ── Background orbs ── */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0;
  }

  .orb-1 {
    width: 700px;
    height: 700px;
    top: -200px;
    left: -150px;
    background: radial-gradient(circle, #3b1f8a 0%, transparent 70%);
    animation: orbFadeIn 3s 0.2s ease forwards, drift1 18s 3.2s ease-in-out infinite alternate;
  }

  .orb-2 {
    width: 600px;
    height: 600px;
    bottom: -180px;
    right: -100px;
    background: radial-gradient(circle, #0d3060 0%, transparent 70%);
    animation: orbFadeIn 3s 0.5s ease forwards, drift2 22s 3.5s ease-in-out infinite alternate;
  }

  .orb-3 {
    width: 400px;
    height: 400px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, #2a0d5e 0%, transparent 70%);
    animation: orbFadeIn 3s 0.8s ease forwards, drift3 15s 3.8s ease-in-out infinite alternate;
  }

  @keyframes orbFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes drift1 {
    from { transform: translate(0, 0) scale(1);        }
    to   { transform: translate(60px, 80px) scale(1.12); }
  }

  @keyframes drift2 {
    from { transform: translate(0, 0) scale(1);           }
    to   { transform: translate(-70px, -50px) scale(1.08); }
  }

  @keyframes drift3 {
    from { transform: translate(-50%, -50%) scale(1);    }
    to   { transform: translate(-50%, -50%) scale(1.25); }
  }

  /* ── Stars ── */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle var(--d, 4s) var(--delay, 0s) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: var(--min-op, 0.05); transform: scale(1);   }
    to   { opacity: var(--max-op, 0.4);  transform: scale(1.4); }
  }

  /* ── Content ── */
  .scene {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 30px;
    text-align: center;
  }

  .card {
    max-width: 640px;
    width: 100%;
    opacity: 0;
    transform: translateY(28px);
    animation: riseIn 1.4s 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes riseIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 300;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-sub);
    margin-bottom: 44px;
    opacity: 0;
    animation: riseIn 1.2s 1.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .eyebrow::before,
  .eyebrow::after {
    content: '';
    display: block;
    width: 32px;
    height: 1px;
    background: var(--line);
  }

  .quote {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(2rem, 5.5vw, 3.2rem);
    line-height: 1.45;
    color: var(--text-main);
    letter-spacing: 0.01em;
    text-shadow:
      0 0 60px rgba(160, 120, 255, 0.18),
      0 2px 4px rgba(0, 0, 0, 0.5);
  }

  .rule {
    position: relative;
    width: 100%;
    height: 1px;
    margin: 48px auto;
    overflow: visible;
    opacity: 0;
    animation: riseIn 1.2s 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .rule::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      transparent 0%,
      var(--line) 20%,
      rgba(190, 165, 255, 0.55) 50%,
      var(--line) 80%,
      transparent 100%
    );
  }

  .rule-diamond {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 6px;
    height: 6px;
    background: var(--accent);
    box-shadow: 0 0 12px 2px rgba(180, 140, 255, 0.5);
  }

  .signoff {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-sub);
    opacity: 0;
    animation: riseIn 1.2s 2.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  /* ── Film grain overlay ── */
  .grain {
    position: fixed;
    inset: -200%;
    z-index: 2;
    pointer-events: none;
    opacity: 0.028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    animation: grainMove 0.8s steps(1) infinite;
  }

  @keyframes grainMove {
    0%   { transform: translate(0,   0);   }
    10%  { transform: translate(-3%, -4%); }
    20%  { transform: translate(4%,  2%);  }
    30%  { transform: translate(-2%, 5%);  }
    40%  { transform: translate(3%, -3%);  }
    50%  { transform: translate(-5%, 1%);  }
    60%  { transform: translate(2%,  4%);  }
    70%  { transform: translate(-4%, -2%); }
    80%  { transform: translate(5%,  3%);  }
    90%  { transform: translate(-1%, -5%); }
    100% { transform: translate(3%,  1%);  }
  }

  @media (max-width: 480px) {
    .card { padding: 0 10px; }
    .rule { margin: 36px auto; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="stars" id="stars"></div>

<div class="grain"></div>

<div class="scene">
  <div class="card">
    <div class="eyebrow">We had some fun times</div>   
    <p class="quote">I'm rooting for you.<br>I always was.</p>
    <div class="rule"><div class="rule-diamond"></div></div>
    <div class="signoff">Take care</div>
  </div>
</div>

<script>
  const container = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 1.8 + 0.6;
    s.style.cssText = `
      width:  ${size}px;
      height: ${size}px;
      top:    ${Math.random() * 100}%;
      left:   ${Math.random() * 100}%;
      --d:        ${(Math.random() * 4 + 3).toFixed(1)}s;
      --delay:    ${(Math.random() * 6).toFixed(1)}s;
      --min-op:   ${(Math.random() * 0.05).toFixed(2)};
      --max-op:   ${(Math.random() * 0.35 + 0.1).toFixed(2)};
    `;
    container.appendChild(s);
  }
</script>

</body>
</html>
