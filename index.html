<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skydork</title>
<style>
    html, body {
        height: 100%;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #1f1c2c, #3a2f4f, #5a4b81);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f5f3ff;
    }

    .container {
        text-align: center;
        padding: 40px 50px;
        max-width: 700px;
    }

    .message {
        font-size: 2rem;
        line-height: 1.5;
        letter-spacing: 0.03em;
        text-shadow: 0 0 10px rgba(200,180,255,0.3);
    }

    .divider {
        width: 80px;
        height: 2px;
        margin: 35px auto;
        background: linear-gradient(to right, transparent, #c9baff, transparent);
        opacity: 0.6;
    }

    .subtle {
        font-size: 0.9rem;
        opacity: 0.55;
        letter-spacing: 0.15em;
        text-transform: uppercase;
    }

    @media (max-width: 600px) {
        .message {
            font-size: 1.5rem;
        }
    }
</style>
</head>
<body>

<div class="container">
    <div class="message">
        I'm rooting for you. I always was.
    </div>

    <div class="divider"></div>

    <div class="subtle">
        Take care
    </div>
</div>

</body>
</html>
